name: Deploy Finance Dashboard

on:
  push:
    branches: [master, main]
    paths:
      - 'finance-dashboard/**'
      - 'docs/**'
      - '.github/workflows/deploy-finance-dashboard.yml'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: finance-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: finance-dashboard
        run: npm ci

      - name: Build
        working-directory: finance-dashboard
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: finance-dashboard
          keep_files: true
